<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Éditeur arbre JSON SENORIF</title>
<style>
:root{ --bg:#eef1f7; --surface:#ffffff; --surface-alt:#f6f8fc; --border:#e2e8f0; --text:#0f172a; --text-muted:#64748b; --primary:#2563eb; --primary-dark:#1d4ed8; --success:#16a34a; --success-dark:#15803d; --warning:#f59e0b; --danger:#dc2626; --radius:14px; --shadow:0 1px 3px rgba(15,23,42,.07),0 1px 2px rgba(15,23,42,.05); --shadow-md:0 6px 18px rgba(15,23,42,.10); }
*{box-sizing:border-box}
html,body{height:100%;touch-action:none}
body{margin:0;display:flex;flex-direction:column;height:100vh;overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg);color:var(--text)}

header{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow)}
.headerTop{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:800;letter-spacing:-.01em}
.toolbar{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;padding:10px 20px 14px}

button{appearance:none;border:1px solid var(--border);background:var(--surface);color:var(--text); font-weight:600;font-size:13px;padding:8px 14px;border-radius:10px;cursor:pointer; transition:transform .1s ease,box-shadow .1s ease,background .1s ease,border-color .1s ease; box-shadow:0 1px 2px rgba(15,23,42,.04)}
button:hover{border-color:#cbd5e1;background:#f8fafc;transform:translateY(-1px);box-shadow:0 3px 8px rgba(15,23,42,.10)}
button.primary{background:var(--primary);border-color:var(--primary);color:white}
button.success{background:var(--success);color:white;border-color:var(--success)}
button.danger{background:var(--surface);color:var(--danger);border-color:#fecaca}
button.danger:hover{background:#fef2f2;border-color:var(--danger)}
button.ghost{background:var(--surface-alt)}

.grp{display:flex;flex-direction:column;gap:6px;background:var(--surface-alt);border:1px solid var(--border); border-radius:12px;padding:8px 10px}
.grpLabel{font-size:10px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.grpBtns{display:flex;gap:6px;flex-wrap:wrap}

.zoomBox,.searchBox{display:flex;gap:6px;align-items:center;background:var(--surface-alt); border:1px solid var(--border);border-radius:12px;padding:8px 10px}
#zoomValue{font-size:12.5px;font-weight:700;min-width:44px;text-align:center;color:var(--text-muted)}
.searchBox input{width:190px}

.main{flex:1;min-height:0;display:grid;grid-template-columns:300px 1fr 330px;gap:16px;padding:16px}
.panel{background:var(--surface);padding:16px;border:1px solid var(--border);border-radius:var(--radius); box-shadow:var(--shadow);overflow:auto}
#canvas{position:relative;overflow:scroll;cursor:grab;border:1px solid var(--border);border-radius:var(--radius); box-shadow:var(--shadow);background-color:#fbfcfe; background-image:radial-gradient(circle,#dbe3ee 1.2px,transparent 1.2px);background-size:22px 22px}
#world{position:relative;width:6000px;height:4000px;transform-origin:0 0}

.node{position:absolute;width:260px;height:112px;border:2px solid var(--primary); background:linear-gradient(180deg,#eff6ff,#e2ecfd);border-radius:16px;padding:12px; box-shadow:0 4px 14px rgba(37,99,235,.16);cursor:pointer;user-select:none;overflow:hidden; box-sizing:border-box;transition:transform .12s ease,box-shadow .12s ease}
.node:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(37,99,235,.24)}
.node.result{border-color:var(--success);background:linear-gradient(180deg,#ecfdf5,#d9f5e3)}
.node.etape{border-color:#0891b2;background:linear-gradient(180deg,#ecfeff,#cffafe)}
.node.selected{outline:3px solid var(--warning);outline-offset:2px}
.type{font-size:9.5px;font-weight:800;color:rgba(15,23,42,.5);margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em}
.title{font-weight:700;font-size:13px;line-height:1.3;color:var(--text);white-space:pre-wrap;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.small{font-size:10.5px;color:var(--text-muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.edge{position:absolute;height:2px;background:#a8b4c5;transform-origin:left center}
.edge.selected{background:var(--warning);height:3px}
.label{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:999px; padding:4px 10px;font-size:11.5px;font-weight:700;cursor:pointer;box-shadow:0 1px 4px rgba(15,23,42,.10)}

textarea,input,select{width:100%;box-sizing:border-box;border:1px solid var(--border);border-radius:10px; padding:9px 10px;font-family:inherit;font-size:13px;background:var(--surface-alt)}
label{font-size:11.5px;font-weight:800;color:var(--text-muted);text-transform:uppercase;margin-top:14px;display:block}
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:50;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modalBox{background:var(--surface);max-width:560px;width:100%;padding:24px;border-radius:18px}
</style>
</head>
<body>
<header>
    <div class="headerTop">
        <span class="brand">Éditeur arbre JSON SENORIF</span>
        <button class="ghost" onclick="toggleHelp()">❓ Aide</button>
    </div>
    <div class="toolbar">
        <div class="grp"><span class="grpLabel">📂 Fichier</span><span class="grpBtns"><button onclick="document.getElementById('fileInput').click()">Charger</button><button onclick="reloadRealTree()">GitHub</button></span></div>
        <div class="grp"><span class="grpLabel">✏️ Éditeur</span><span class="grpBtns"><button onclick="addQuestion()">+ Q</button><button onclick="addEtape()">+ Ét</button><button onclick="addResult()">+ R</button><button onclick="toggleConnect()">Relier</button></span></div>
        <div class="grp"><span class="grpLabel">💾 Enregistrer</span><span class="grpBtns"><button class="primary" onclick="exportJSON()">JSON</button><button class="success" onclick="saveForGithub()">GitHub</button></span></div>
        <span class="zoomBox">
            <button onclick="zoomOut()">−</button><input id="zoomSlider" type="range" min="3" max="200" value="100" oninput="setZoom(this.value/100)" style="width:100px"><button onclick="zoomIn()">+</button>
            <button id="fullscreenBtn" onclick="toggleFullscreen()">⛶ Plein écran</button>
        </span>
    </div>
</header>

<input type="file" id="fileInput" accept=".json" style="display:none">

<div class="main" id="mainGrid">
    <div class="panel" id="leftPanel"><h3>Parcours</h3><div id="list"></div></div>
    <div id="canvas"><div id="world"></div></div>
    <div class="panel right" id="rightPanel">
        <h3>Édition <button class="ghost" style="padding:2px 8px" onclick="closeRightPanel()">✕</button></h3>
        <div id="editEmpty">Cliquez sur un nœud.</div>
        <div id="nodeEdit" style="display:none">
            <label>Type</label><select id="editType"><option value="question">Question</option><option value="etape">Étape</option><option value="resultat">Recommandation</option></select>
            <label>Titre</label><textarea id="editTitle"></textarea>
            <label style="display:none">Données JSON</label><textarea id="editData" style="display:none"></textarea>
            <label>Source</label><input id="editSource">
            <button class="primary" style="width:100%;margin-top:16px" onclick="applyNodeEdits()">Valider</button>
            <hr class="divider"><button class="danger" style="width:100%" onclick="deleteNode()">🗑 Supprimer</button>
        </div>
        <div id="edgeEdit" style="display:none">
            <label>Réponse / Branche</label><input id="editEdgeLabel"><button class="primary" style="width:100%;margin-top:16px" onclick="applyEdgeEdits()">Valider</button>
            <hr class="divider"><button class="danger" style="width:100%" onclick="deleteEdge()">🗑 Supprimer branche</button>
        </div>
    </div>
</div>

<script>
let nodes=[], edges=[];
let selectedNode=null, selectedEdge=null, rightPanelOpen=true, fullscreenTree=false, connectMode=false, connectSource=null, pan=null, zoom=1, undoStack=[], redoStack=[];

// Dimensions des nœuds dans le calcul de la mise en page automatique : doivent rester
// cohérentes avec .node{width / height} en CSS (260px / 112px) pour que les traits
// reliant les nœuds partent bien du bord visible des boîtes.
const NODE_W=260, NODE_H=112, X_GAP=80, Y_GAP=190;

// 1. GESTION SUPPRESSION CLAVIER
document.addEventListener("keydown", function(ev) {
    if (ev.key === "Delete" || ev.key === "Backspace") {
        let tag = ev.target.tagName;
        if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
        if (selectedNode) deleteNode();
        else if (selectedEdge) deleteEdge();
    }
});

// 2. GESTION PLEIN ÉCRAN
function toggleFullscreen() {
    let elem = document.getElementById("canvas");
    if (!document.fullscreenElement) elem.requestFullscreen();
    else document.exitFullscreen();
}

function uid(p){return p+Math.random().toString(36).slice(2,9)}
function node(id){return nodes.find(n=>n.id===id)}
function edge(id){return edges.find(e=>e.id===id)}
function edgeValues(e){return String((e&&e.label)||"").split(",").map(s=>s.trim()).filter(Boolean)}
function edgeLabelDisplay(e){let vals=edgeValues(e); return vals.length?vals.join(" / "):"";}

function treeToGraph(tree){
 nodes=[]; edges=[]; let count=1;
 function walk(t, parent, label){
  if(!t) return null;
  let id="n"+count++;
  nodes.push({id, type:t.type||"question", titre:t.titre||"", donnees:t.donnees||{}, source_senorif:t.source_senorif||"", x:0, y:0});
  if(parent) edges.push({id:uid("e"),source:parent,target:id,label:label||""});
  if(t.type==="etape" && t.suite) walk(t.suite, id, "");
  if(t.choix) Object.entries(t.choix).forEach(([lab,child])=>Array.isArray(child)?child.forEach(c=>walk(c,id,lab)):walk(child,id,lab));
  return id;
 }
 walk(tree,null,""); autoLayout(); render();
}

function autoLayout(){
 if(!nodes.length) return;
 let incoming=new Set(edges.map(e=>e.target));
 let roots=nodes.filter(n=>!incoming.has(n.id));
 if(!roots.length) roots=[nodes[0]];
 let cursorX=300; let visited=new Set();
 function place(id, depth){
  if(visited.has(id)) return node(id);
  visited.add(id);
  let n=node(id); if(!n) return null;
  let y=80+depth*Y_GAP;
  let childEdges=edges.filter(e=>e.source===id);
  if(!childEdges.length){ n.x=cursorX; n.y=y; cursorX += NODE_W + X_GAP; }
  else {
    let childXs=[]; childEdges.forEach(e=>{ let c=place(e.target, depth+1); if(c) childXs.push(c.x); });
    n.x = childXs.length ? (Math.min(...childXs)+Math.max(...childXs))/2 : cursorX;
    // Anti-superposition
    nodes.forEach(other=>{ if(other.id!==n.id && other.y===y && Math.abs(other.x-n.x)<NODE_W+20) n.x = Math.max(n.x, other.x + NODE_W + X_GAP); });
    if(n.x >= cursorX) cursorX = n.x + NODE_W + X_GAP;
    n.y=y;
  }
  return n;
 }
 roots.forEach(r=>place(r.id,0));
 nodes.forEach(n=>{if(!visited.has(n.id)){ n.x=cursorX; n.y=80; cursorX += NODE_W + X_GAP; visited.add(n.id); }});
 resizeWorld();
}

function graphToTree(){
 let targets=new Set(edges.map(e=>e.target));
 let root=nodes.find(n=>!targets.has(n.id))||nodes[0];
 function build(n){
  if(!n) return {};
  if(n.type==="resultat") return {type:"resultat", titre:n.titre||"", donnees:n.donnees||{}, source_senorif:n.source_senorif||""};
  if(n.type==="etape") {
    let out=edges.filter(e=>e.source===n.id);
    if(out.length===1 && !out[0].label) return {type:"etape", titre:n.titre, suite:build(node(out[0].target))};
    let choix={}; out.forEach((e,i)=>{ let ch=build(node(e.target)); let l=e.label||"Branche "+(i+1); choix[l]=ch; });
    return {type:"etape", titre:n.titre, choix};
  }
  let choix={}; edges.filter(e=>e.source===n.id).forEach((e,i)=>{ let ch=build(node(e.target)); choix[e.label||"Réponse "+(i+1)]=ch; });
  return {type:n.type, titre:n.titre, choix};
 }
 return build(root);
}

function render(){
 let w=document.getElementById("world"); w.innerHTML="";
 edges.forEach(renderEdge);
 nodes.forEach(renderNode);
 renderEditor();
}

function renderNode(n){
 let el=document.createElement("div");
 el.className="node "+(n.type==="resultat"?"result ":"")+(n.type==="etape"?"etape ":"")+(selectedNode===n.id?"selected":"");
 el.style.left=n.x+"px"; el.style.top=n.y+"px";
 el.innerHTML="<div class='type'>"+esc(n.type)+"</div><div class='title'>"+esc(n.titre)+"</div>";
 el.onpointerdown=function(ev){
  ev.stopPropagation();
  if(connectMode){
   if(!connectSource){ connectSource=n.id; return; }
   edges.push({id:uid("e"), source:connectSource, target:n.id, label:""});
   connectSource=null; connectMode=false;
   autoLayout(); render();
   return;
  }
  selectedNode=n.id; selectedEdge=null; render();
 };
 document.getElementById("world").appendChild(el);
}

function renderEdge(e){
 let s=node(e.source), t=node(e.target); if(!s||!t)return;
 let w=document.getElementById("world");
 let x1=s.x+NODE_W/2, y1=s.y+NODE_H, x2=t.x+NODE_W/2, y2=t.y;
 let len=Math.sqrt(Math.pow(x2-x1,2)+Math.pow(y2-y1,2));
 let line=document.createElement("div"); line.className="edge"; line.style.left=x1+"px"; line.style.top=y1+"px"; line.style.width=len+"px"; line.style.transform="rotate("+Math.atan2(y2-y1,x2-x1)+"rad)";
 w.appendChild(line);
 let lab=document.createElement("div"); lab.className="label"; lab.style.left=(x1+x2)/2+"px"; lab.style.top=(y1+y2)/2+"px"; lab.textContent=edgeLabelDisplay(e);
 lab.onclick=function(){selectedEdge=e.id; selectedNode=null; render();};
 w.appendChild(lab);
}

function renderEditor(){
 let n=node(selectedNode), e=edge(selectedEdge);
 document.getElementById("editEmpty").style.display=n||e?"none":"block";
 document.getElementById("nodeEdit").style.display=n?"block":"none";
 document.getElementById("edgeEdit").style.display=e?"block":"none";
 if(n){ document.getElementById("editType").value=n.type; document.getElementById("editTitle").value=n.titre; document.getElementById("editSource").value=n.source_senorif; }
 if(e){ document.getElementById("editEdgeLabel").value=e.label; }
}

function closeRightPanel(){ selectedNode=null; selectedEdge=null; rightPanelOpen=false; render(); }
function addNodeLinkedToSelection(n){
    nodes.push(n);
    if(selectedNode) edges.push({id:uid("e"), source:selectedNode, target:n.id, label:""});
    selectedNode=n.id; selectedEdge=null;
    autoLayout(); render();
}
function addQuestion(){ addNodeLinkedToSelection({id:uid("n"), type:"question", titre:"Nouvelle question", donnees:{}, source_senorif:"", x:0, y:0}); }
function addEtape(){ addNodeLinkedToSelection({id:uid("n"), type:"etape", titre:"Nouvelle étape", donnees:{}, source_senorif:"", x:0, y:0}); }
function addResult(){ addNodeLinkedToSelection({id:uid("n"), type:"resultat", titre:"Nouvelle recommandation", donnees:{}, source_senorif:"", x:0, y:0}); }
function deleteNode(){ nodes=nodes.filter(n=>n.id!==selectedNode); edges=edges.filter(e=>e.source!==selectedNode && e.target!==selectedNode); selectedNode=null; autoLayout(); render(); }
function deleteEdge(){ edges=edges.filter(e=>e.id!==selectedEdge); selectedEdge=null; render(); }
function applyNodeEdits(){ let n=node(selectedNode); n.type=document.getElementById("editType").value; n.titre=document.getElementById("editTitle").value; n.source_senorif=document.getElementById("editSource").value; render(); }
function applyEdgeEdits(){ let e=edge(selectedEdge); e.label=document.getElementById("editEdgeLabel").value; render(); }
function resizeWorld(){ let w=document.getElementById("world"); w.style.width="6000px"; w.style.height="4000px"; }
function exportJSON(){ let txt=JSON.stringify(graphToTree(),null,2); let blob=new Blob([txt],{type:"application/json"}); let a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="arbre.json"; a.click(); }
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function setZoom(z){ zoom=Math.max(0.03,Math.min(2,z)); document.getElementById("world").style.transform="scale("+zoom+")"; }
function zoomIn(){setZoom(zoom+0.1)} function zoomOut(){setZoom(zoom-0.1)}
function reloadRealTree(){ fetch("arbre_dynamique.json?_v="+Date.now()).then(r=>r.json()).then(treeToGraph).catch(()=>alert("Erreur chargement")); }

function toggleHelp(){
 alert("Cliquez un nœud pour l'éditer dans le panneau de droite.\n+ Q / + Ét / + R ajoute une question / étape / recommandation liée au nœud sélectionné.\n« Relier » : cliquez un nœud parent puis un nœud enfant pour créer une branche entre eux.\nGlissez le fond pour vous déplacer, molette ou + / − pour zoomer.\nSuppr ou Retour arrière supprime le nœud ou la branche sélectionnée.");
}
function toggleConnect(){
 connectMode=!connectMode; connectSource=null;
 alert(connectMode ? "Cliquez le nœud parent, puis le nœud enfant." : "Mode liaison désactivé.");
}
function saveForGithub(){
 exportJSON();
 alert("Le fichier a été téléchargé. Remplacez l'ancien arbre_dynamique.json sur GitHub puis commitez les changements.");
}

reloadRealTree();
</script>
</body>
</html>
